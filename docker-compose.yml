services:
  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "/entrypoint-ollama.sh"]
    volumes:
      - ollama_data:/root/.ollama
      - ./models/entrypoint-ollama.sh:/entrypoint-ollama.sh:ro
    ports:
      - "11434:11434"
    # Uncomment the deploy section below to enable GPU acceleration
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [aijudge-net]

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - PORT=5000
    depends_on:
      ollama:
        condition: service_healthy
    networks: [aijudge-net]

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file: .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
    networks: [aijudge-net]

networks:
  aijudge-net:

volumes:
  ollama_data:
