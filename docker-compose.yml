services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PORT=5000
    networks: [aijudge-net]

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file: .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
    networks: [aijudge-net]

networks:
  aijudge-net:
